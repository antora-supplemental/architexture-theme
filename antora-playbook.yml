# Antora Playbook for architexture-theme
site:
  title: architexture-theme
  url: https://antora-supplemental.github.io/architexture-theme
  start_page: architexture-theme:guide:index.adoc
  keys:
    header_kicker: Documentation
    header_doc_title: architexture-theme

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs

# Demo site builds from ./supplemental-ui (theme sources). Consumers use release ui-bundle.zip.
ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./supplemental-ui

output:
  dir: ./build/site

asciidoc:
  attributes:
    source-highlighter: highlight.js
    icons: font
